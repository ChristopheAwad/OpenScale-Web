version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - app_data:/app/data
      - app_uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  app_data:
  app_uploads:
